<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 650" fill="none">
  <defs>
    <!-- Universe galaxy core glow -->
    <radialGradient id="galaxyCore" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#E8F4FF" stop-opacity="1"/>
      <stop offset="15%" stop-color="#7DB8F0" stop-opacity="0.95"/>
      <stop offset="40%" stop-color="#3E7BC6" stop-opacity="0.85"/>
      <stop offset="70%" stop-color="#1E4878" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0A1F3D" stop-opacity="0"/>
    </radialGradient>
    <!-- Nebula purple-blue mix -->
    <radialGradient id="nebula" cx="45%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#B4D9FF" stop-opacity="0.0"/>
      <stop offset="40%" stop-color="#5B8DD9" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#1A3A6E" stop-opacity="0"/>
    </radialGradient>
    <!-- Hand gradient (light, elegant marble) -->
    <linearGradient id="handLight" x1="0%" y1="0%" x2="20%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="50%" stop-color="#EAF2FB"/>
      <stop offset="100%" stop-color="#B8CBE3"/>
    </linearGradient>
    <linearGradient id="handShadow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D5E2F2"/>
      <stop offset="100%" stop-color="#9AB3CF"/>
    </linearGradient>
    <!-- Gold accent -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0D060"/>
      <stop offset="100%" stop-color="#C9A227"/>
    </linearGradient>
    <!-- Outer glow filter -->
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="strongGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Ambient outer glow (the universe radiating) -->
  <circle cx="300" cy="250" r="220" fill="url(#nebula)"/>

  <!-- Outer orbit rings (gold) -->
  <ellipse cx="300" cy="250" rx="210" ry="72" stroke="url(#goldGrad)" stroke-width="1.5" fill="none" transform="rotate(-15 300 250)" opacity="0.6"/>
  <ellipse cx="300" cy="250" rx="240" ry="90" stroke="#7DB8F0" stroke-width="0.75" fill="none" transform="rotate(10 300 250)" opacity="0.35"/>

  <!-- ════════ THE UNIVERSE (inside the hand) ════════ -->
  <g filter="url(#strongGlow)">
    <!-- Main galaxy sphere -->
    <circle cx="300" cy="235" r="130" fill="url(#galaxyCore)"/>

    <!-- Bright core highlight -->
    <circle cx="285" cy="215" r="55" fill="#FFFFFF" opacity="0.45" filter="url(#softGlow)"/>
    <circle cx="280" cy="210" r="25" fill="#FFFFFF" opacity="0.8"/>

    <!-- Spiral galaxy arms (subtle curves) -->
    <path d="M 300 235 Q 230 180 200 240 Q 185 290 235 310 Q 280 320 300 290"
          fill="none" stroke="#9BC7ED" stroke-width="2" opacity="0.5"/>
    <path d="M 300 235 Q 370 290 400 230 Q 415 180 365 160 Q 320 150 300 180"
          fill="none" stroke="#9BC7ED" stroke-width="2" opacity="0.5"/>

    <!-- Stars scattered inside the universe -->
    <g fill="#FFFFFF">
      <circle cx="240" cy="185" r="1.8" opacity="0.9"/>
      <circle cx="355" cy="200" r="1.5" opacity="0.85"/>
      <circle cx="220" cy="260" r="1.2" opacity="0.7"/>
      <circle cx="375" cy="270" r="2" opacity="0.95"/>
      <circle cx="280" cy="295" r="1.3" opacity="0.7"/>
      <circle cx="330" cy="170" r="1.6" opacity="0.85"/>
      <circle cx="200" cy="225" r="1" opacity="0.6"/>
      <circle cx="395" cy="235" r="1.4" opacity="0.75"/>
      <circle cx="260" cy="160" r="1" opacity="0.55"/>
      <circle cx="345" cy="300" r="1.2" opacity="0.65"/>
    </g>

    <!-- Brighter 4-point stars (sparkle) -->
    <g fill="#FFFFFF" filter="url(#softGlow)">
      <path d="M 250 220 L 252 214 L 254 220 L 260 222 L 254 224 L 252 230 L 250 224 L 244 222 Z" opacity="0.9"/>
      <path d="M 365 250 L 367 245 L 369 250 L 374 252 L 369 254 L 367 259 L 365 254 L 360 252 Z" opacity="0.85"/>
    </g>

    <!-- Financial chart line wrapping through the universe (gold) -->
    <path d="M 195 230 Q 225 205 245 235 Q 265 265 290 220 Q 310 190 335 225 Q 358 255 385 225 Q 400 210 405 200"
          stroke="url(#goldGrad)" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.9"/>
    <!-- Arrow tip -->
    <path d="M 401 196 L 411 190 L 408 202 Z" fill="#F0D060"/>

    <!-- Mini trend bars -->
    <g fill="url(#goldGrad)" opacity="0.8">
      <rect x="255" y="290" width="5" height="14" rx="1"/>
      <rect x="263" y="283" width="5" height="21" rx="1"/>
      <rect x="271" y="275" width="5" height="29" rx="1"/>
      <rect x="279" y="266" width="5" height="38" rx="1"/>
    </g>

    <!-- Currency symbols floating in the cosmos -->
    <g fill="#F0D060" opacity="0.75" font-family="Georgia, serif" font-weight="bold">
      <text x="222" y="252" font-size="13">$</text>
      <text x="362" y="285" font-size="11">€</text>
      <text x="315" y="195" font-size="10">£</text>
    </g>
  </g>

  <!-- ════════ THE HAND (cupping the universe from below) ════════ -->
  <g>
    <!-- Forearm/wrist -->
    <path d="M 205 630 Q 200 540 230 495 L 255 500 Q 232 555 228 635 Z" fill="url(#handShadow)" opacity="0.9"/>

    <!-- Palm (cupped, cradling the sphere) -->
    <path d="M 232 498 Q 222 430 255 395 Q 285 368 320 370 Q 358 368 388 395 Q 415 422 415 475 Q 415 510 395 528 Q 375 542 348 544 Q 315 546 282 538 Q 248 528 235 516 Q 225 508 232 498 Z"
          fill="url(#handLight)"/>

    <!-- Thumb -->
    <path d="M 388 408 Q 428 385 448 418 Q 460 445 440 465 Q 420 475 400 462 Q 388 448 388 420 Z"
          fill="url(#handLight)"/>

    <!-- Fingers (folded upward, embracing sphere) -->
    <path d="M 258 400 Q 250 350 270 335 Q 285 325 295 340 Q 300 360 292 385 Z"
          fill="url(#handLight)" opacity="0.95"/>
    <path d="M 290 385 Q 288 330 310 318 Q 325 312 332 330 Q 335 355 325 380 Z"
          fill="url(#handLight)" opacity="0.95"/>
    <path d="M 322 382 Q 325 328 348 320 Q 362 318 366 338 Q 365 360 355 380 Z"
          fill="url(#handLight)" opacity="0.95"/>
    <path d="M 352 388 Q 360 345 378 342 Q 390 343 390 360 Q 386 378 374 390 Z"
          fill="url(#handLight)" opacity="0.9"/>

    <!-- Finger crease details -->
    <g stroke="#9AB3CF" stroke-width="1" opacity="0.4" fill="none">
      <path d="M 262 420 Q 285 412 305 415"/>
      <path d="M 295 405 Q 315 398 332 402"/>
      <path d="M 325 402 Q 342 397 358 402"/>
    </g>

    <!-- Inner palm glow (where universe touches hand) -->
    <ellipse cx="323" cy="430" rx="62" ry="32" fill="#FFFFFF" opacity="0.2"/>
    <!-- Light reflection on palm -->
    <ellipse cx="295" cy="475" rx="35" ry="15" fill="#FFFFFF" opacity="0.15"/>

    <!-- Gold cuff bracelet (premium accent) -->
    <ellipse cx="232" cy="500" rx="28" ry="8" fill="none" stroke="url(#goldGrad)" stroke-width="3" opacity="0.7"/>
    <ellipse cx="420" cy="440" rx="24" ry="7" fill="none" stroke="url(#goldGrad)" stroke-width="2.5" opacity="0.5"/>
  </g>

  <!-- Rising particles (prosperity emanating from universe) -->
  <g fill="#FFFFFF" opacity="0.7">
    <circle cx="300" cy="85" r="2"/>
    <circle cx="340" cy="60" r="1.5"/>
    <circle cx="265" cy="70" r="1.8"/>
    <circle cx="375" cy="110" r="1.3" opacity="0.5"/>
    <circle cx="230" cy="115" r="1.3" opacity="0.5"/>
  </g>
  <g fill="url(#goldGrad)" opacity="0.6">
    <circle cx="320" cy="95" r="1.5"/>
    <circle cx="355" cy="80" r="1"/>
    <circle cx="285" cy="55" r="1.2"/>
  </g>
  <g stroke="#F0D060" stroke-width="0.6" opacity="0.35">
    <line x1="300" y1="85" x2="300" y2="108"/>
    <line x1="340" y1="60" x2="335" y2="82"/>
    <line x1="265" y1="70" x2="270" y2="92"/>
  </g>

  <!-- Ground shadow of the hand -->
  <ellipse cx="320" cy="580" rx="110" ry="14" fill="#1E4878" opacity="0.1"/>
</svg>
